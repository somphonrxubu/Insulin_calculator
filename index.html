<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบการคำนวณการออกฤทธิ์ของยาฉีดอินซูลิน</title>
    
    <!-- Google Fonts: Prompt for Thai readability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js & Annotation Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <!-- Flatpickr for Thai Calendar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#F0F9F6',
                            100: '#E1F5EE',
                            200: '#9FE1CB',
                            500: '#0F6E56',
                            600: '#0B5542',
                            700: '#085041',
                            800: '#04342C',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for graph wrapper */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Ensure Flatpickr calendar uses Prompt font */
        .flatpickr-calendar { font-family: 'Prompt', sans-serif !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <!-- Toast Notification (Replaces alert) -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 transform transition-all duration-300 opacity-0 -translate-y-full z-50 pointer-events-none">
        <i class="ti ti-alert-circle text-xl"></i>
        <span id="toastMsg" class="font-medium text-sm"></span>
    </div>

    <main class="max-w-3xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="bg-brand-500 text-white p-5 sm:p-6 rounded-2xl shadow-lg shadow-brand-500/20 mb-6 relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-lg sm:text-xl font-semibold flex items-center gap-2">
                    <i class="ti ti-vaccine text-2xl"></i>
                    ระบบการคำนวณการออกฤทธิ์อินซูลิน
                </h1>
                <p class="text-brand-200 text-sm mt-1">
                    โรงพยาบาลกุสุมาลย์ จังหวัดสกลนคร
                </p>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -right-8 -top-8 w-32 h-32 bg-white opacity-5 rounded-full blur-2xl"></div>
        </header>

        <!-- Input Section -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 mb-6">
            
            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">เลือกชนิดอินซูลิน</h2>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                <!-- RI Button -->
                <button type="button" class="insulin-btn group flex flex-col items-center justify-center p-4 border rounded-xl transition-all duration-200 hover:bg-slate-50 focus:outline-none" data-insulin="RI" onclick="selectInsulin('RI', this)">
                    <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3 group-hover:bg-brand-50 transition-colors icon-container">
                        <i class="ti ti-bolt text-2xl text-slate-500 group-hover:text-brand-500 transition-colors icon-element"></i>
                    </div>
                    <span class="font-medium text-slate-800 text-sm name-element">Regular Insulin (RI)</span>
                    <span class="text-xs text-slate-500 mt-1">Short-acting</span>
                </button>

                <!-- NPH Button -->
                <button type="button" class="insulin-btn group flex flex-col items-center justify-center p-4 border rounded-xl transition-all duration-200 hover:bg-slate-50 focus:outline-none" data-insulin="NPH" onclick="selectInsulin('NPH', this)">
                    <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3 group-hover:bg-brand-50 transition-colors icon-container">
                        <i class="ti ti-clock text-2xl text-slate-500 group-hover:text-brand-500 transition-colors icon-element"></i>
                    </div>
                    <span class="font-medium text-slate-800 text-sm name-element">NPH Insulin</span>
                    <span class="text-xs text-slate-500 mt-1">Intermediate-acting</span>
                </button>

                <!-- MIX Button -->
                <button type="button" class="insulin-btn group flex flex-col items-center justify-center p-4 border rounded-xl transition-all duration-200 hover:bg-slate-50 focus:outline-none" data-insulin="MIX" onclick="selectInsulin('MIX', this)">
                    <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3 group-hover:bg-brand-50 transition-colors icon-container">
                        <i class="ti ti-adjustments-horizontal text-2xl text-slate-500 group-hover:text-brand-500 transition-colors icon-element"></i>
                    </div>
                    <span class="font-medium text-slate-800 text-sm name-element">Mixtard Insulin</span>
                    <span class="text-xs text-slate-500 mt-1">Premixed (NPH70/RI30)</span>
                </button>
            </div>

            <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">กำหนดวันและเวลาที่ให้ยา</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div>
                    <label for="inDate" class="block text-sm text-slate-600 mb-1.5 flex items-center gap-1">
                        <i class="ti ti-calendar"></i> วันที่ฉีด
                    </label>
                    <input type="text" id="inDate" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all cursor-pointer" placeholder="เลือกวันที่">
                </div>
                <div>
                    <label for="inTime" class="block text-sm text-slate-600 mb-1.5 flex items-center gap-1">
                        <i class="ti ti-clock-hour-4"></i> เวลาที่ฉีด
                    </label>
                    <input type="time" id="inTime" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                </div>
            </div>

            <button id="calcBtn" onclick="calculate()" disabled class="w-full bg-brand-500 hover:bg-brand-600 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed text-white font-medium py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all duration-200 shadow-md disabled:shadow-none">
                <i class="ti ti-calculator text-lg"></i>
                คำนวณการออกฤทธิ์ของยา
            </button>
        </section>

        <!-- Result Section (Hidden initially) -->
        <section id="resultSection" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 mb-12 opacity-0 transition-opacity duration-500">
            
            <h2 id="resultTitle" class="text-lg font-semibold text-slate-800 mb-1 border-b pb-3 border-slate-100"></h2>
            
            <div class="mt-4 mb-2">
                <p class="text-sm font-medium text-slate-600 mb-2">กราฟแสดงการออกฤทธิ์ของยาตามช่วงเวลา</p>
                <div class="w-full overflow-x-auto no-scrollbar pb-2">
                    <div style="min-width: 600px;">
                        <canvas id="insulinChart" height="220"></canvas>
                    </div>
                </div>
                
                <!-- Chart Legend -->
                <div class="flex flex-wrap gap-4 mt-3 bg-slate-50 p-3 rounded-lg border border-slate-100" id="chartLegend">
                    <!-- Populated by JS -->
                </div>
            </div>

            <hr class="my-6 border-slate-100">

            <!-- Information Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6" id="infoGrid">
                <!-- Populated by JS -->
            </div>

            <!-- Hypoglycemia Warning Box -->
            <div id="hypoBox" class="bg-red-50 border-l-4 border-red-500 p-4 sm:p-5 rounded-r-xl mb-4">
                 <!-- Populated by JS -->
            </div>

            <!-- Advice Box -->
            <div id="adviceBox" class="bg-blue-50 border-l-4 border-blue-500 p-4 sm:p-5 rounded-r-xl mb-6">
                 <!-- Populated by JS -->
            </div>

            <button onclick="resetAll()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors">
                <i class="ti ti-refresh text-lg"></i>
                เริ่มใหม่สำหรับผู้ป่วยรายต่อไป
            </button>
        </section>

        <!-- Footer Reference -->
        <footer class="mt-2 mb-6 text-center">
            <p class="text-xs text-slate-400">
                อ้างอิง: ADA Standards of Care in Diabetes 2024, สมาคมโรคเบาหวานแห่งประเทศไทย
            </p>
        </footer>

    </main>

    <script>
        // Data Configuration
        const INSULIN = {
            RI:  { name:'Regular Insulin (RI)', onset:[0.5,1], peak:[1,2], duration:[5,8], mealTime:'ก่อนอาหาร 30 นาที' },
            NPH: { name:'NPH Insulin', onset:[2,4], peak:[6,10], duration:[10,16], mealTime:'ก่อนอาหาร 30 นาที' },
            MIX: { name:'Mixtard Insulin (NPH70/RI30)', onset:[0.5,1], peak:[[1,2],[6,10]], duration:[10,16], mealTime:'ก่อนอาหาร 30 นาที' }
        };

        let selected = null;
        let chartInstance = null;
        let datePickerInstance = null;

        // Register Annotation Plugin explicitly for CDN usage
        Chart.register(window['chartjs-plugin-annotation']);

        // Initialize Date/Time to current
        function setNow() {
            const now = new Date();
            
            if (datePickerInstance) {
                datePickerInstance.setDate(now);
            } else {
                // Initialize Flatpickr with Thai localization and Buddhist Era format
                datePickerInstance = flatpickr("#inDate", {
                    locale: "th",
                    defaultDate: now,
                    dateFormat: "Y-m-d", // Background value logic
                    altInput: true,
                    altFormat: "custom-th", // Custom display format
                    formatDate: (date, formatStr, locale) => {
                        // Custom formatter to show Buddhist Year (+543)
                        if (formatStr === 'custom-th') {
                            const day = date.getDate();
                            const month = locale.months.longhand[date.getMonth()];
                            const year = date.getFullYear() + 543;
                            return `${day} ${month} ${year}`;
                        }
                        // Fallback to default YYYY-MM-DD
                        const d = date.getDate().toString().padStart(2, '0');
                        const m = (date.getMonth() + 1).toString().padStart(2, '0');
                        const y = date.getFullYear();
                        return `${y}-${m}-${d}`;
                    }
                });
            }
            
            document.getElementById('inTime').value = now.toTimeString().slice(0,5);
        }

        // Custom Toast Notification
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            
            toast.classList.remove('opacity-0', '-translate-y-full', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-full', 'pointer-events-none');
            }, 3000);
        }

        // Handle Insulin Selection
        function selectInsulin(key, el) {
            selected = key;
            const buttons = document.querySelectorAll('.insulin-btn');
            const calcBtn = document.getElementById('calcBtn');
            const resultSection = document.getElementById('resultSection');
            
            // Reset all buttons styling
            buttons.forEach(b => {
                b.classList.remove('border-brand-500', 'bg-brand-50', 'ring-2', 'ring-brand-500/20');
                b.classList.add('border-slate-200');
                
                // Reset internal elements
                b.querySelector('.icon-container').classList.remove('bg-brand-500');
                b.querySelector('.icon-container').classList.add('bg-slate-100');
                b.querySelector('.icon-element').classList.remove('text-white');
                b.querySelector('.icon-element').classList.add('text-slate-500');
                b.querySelector('.name-element').classList.remove('text-brand-700');
            });

            // Apply active styling to selected button
            el.classList.remove('border-slate-200');
            el.classList.add('border-brand-500', 'bg-brand-50', 'ring-2', 'ring-brand-500/20');
            
            el.querySelector('.icon-container').classList.remove('bg-slate-100');
            el.querySelector('.icon-container').classList.add('bg-brand-500');
            el.querySelector('.icon-element').classList.remove('text-slate-500');
            el.querySelector('.icon-element').classList.add('text-white');
            el.querySelector('.name-element').classList.add('text-brand-700');

            // Enable calculate button and hide previous results
            calcBtn.disabled = false;
            resultSection.classList.add('hidden');
            resultSection.classList.remove('opacity-100');
        }

        // Helper: Format Time string
        function toTimeStr(base, h) {
            const d = new Date(base.getTime() + h * 3600000);
            return d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', hour12:false}) + ' น.';
        }

        // Helper: Format Time Range
        function fmtRange(base, h1, h2) {
            return toTimeStr(base, h1) + ' – ' + toTimeStr(base, h2);
        }

        // Calculate curve points
        function buildCurve(key, totalHrs) {
            const ins = INSULIN[key];
            const pts = [];
            const step = totalHrs / 120; // Resolution
            
            for (let i = 0; i <= 120; i++) {
                const t = i * step;
                let y = 0;
                
                if (key === 'RI') {
                    if (t < ins.onset[0]) y = 0;
                    else if (t < ins.peak[0]) y = (t - ins.onset[0]) / (ins.peak[0] - ins.onset[0]) * 80;
                    else if (t <= ins.peak[1]) y = 80 + (t - ins.peak[0]) / (ins.peak[1] - ins.peak[0]) * 20;
                    else if (t < ins.duration[0]) y = 100 - (t - ins.peak[1]) / (ins.duration[0] - ins.peak[1]) * 60;
                    else if (t <= ins.duration[1]) y = 40 - (t - ins.duration[0]) / (ins.duration[1] - ins.duration[0]) * 40;
                    else y = 0;
                } else if (key === 'NPH') {
                    if (t < ins.onset[0]) y = 0;
                    else if (t < ins.peak[0]) y = (t - ins.onset[0]) / (ins.peak[0] - ins.onset[0]) * 100;
                    else if (t <= ins.peak[1]) y = 100;
                    else if (t <= ins.duration[1]) y = 100 - (t - ins.peak[1]) / (ins.duration[1] - ins.peak[1]) * 100;
                    else y = 0;
                } else {
                    // Mixtard logic
                    let ri = 0, nph = 0;
                    if (t >= 0.5 && t < 1) ri = (t - 0.5) / 0.5 * 60;
                    else if (t >= 1 && t <= 2) ri = 60 + (t-1)*10;
                    else if (t > 2 && t <= 5) ri = 70 - (t-2)/3*70;
                    else ri = 0;
                    
                    if (t >= 2 && t < 6) nph = (t-2)/4 * 90;
                    else if (t >= 6 && t <= 10) nph = 90 + (t-6)/4*10;
                    else if (t > 10 && t <= 16) nph = 100 - (t-10)/6*100;
                    else nph = 0;
                    
                    y = Math.max(ri, nph * 0.85 + ri * 0.15);
                }
                pts.push({ x: t, y: Math.max(0, Math.min(100, y)) });
            }
            return pts;
        }

        // Build Chart.js Annotations for Onset/Peak
        function buildAnnotations(key, base, totalHrs) {
            const ins = INSULIN[key];
            const anns = {};

            // Onset region
            anns['onset-box'] = {
                type: 'box', xMin: ins.onset[0], xMax: ins.onset[1],
                yMin: 0, yMax: 105,
                backgroundColor: 'rgba(52, 211, 153, 0.15)', // emerald-400
                borderColor: 'rgba(16, 185, 129, 0.5)',     // emerald-500
                borderWidth: 1,
                drawTime: 'beforeDatasetsDraw'
            };
            anns['onset-label'] = {
                type: 'label', xValue: (ins.onset[0]+ins.onset[1])/2, yValue: 95,
                content: ['Onset'], color: '#047857', font: {family: 'Prompt', size: 10, weight: '600'}, textAlign: 'center'
            };

            // Peak region(s)
            if (key !== 'MIX') {
                anns['peak-box'] = {
                    type: 'box', xMin: ins.peak[0], xMax: ins.peak[1],
                    yMin: 0, yMax: 105,
                    backgroundColor: 'rgba(239, 68, 68, 0.08)', // red-500
                    borderColor: 'rgba(239, 68, 68, 0.3)',      // red-500
                    borderWidth: 1,
                    drawTime: 'beforeDatasetsDraw'
                };
                anns['peak-label'] = {
                    type: 'label', xValue: (ins.peak[0]+ins.peak[1])/2, yValue: 95,
                    content: ['Peak'], color: '#B91C1C', font: {family: 'Prompt', size: 10, weight: '600'}, textAlign: 'center'
                };
            } else {
                // MIX has two peaks
                anns['peak1-box'] = {
                    type:'box', xMin:1, xMax:2, yMin:0, yMax:105,
                    backgroundColor:'rgba(239, 68, 68, 0.08)', borderColor:'rgba(239, 68, 68, 0.3)', borderWidth:1, drawTime: 'beforeDatasetsDraw'
                };
                anns['peak1-label'] = {
                    type:'label', xValue:1.5, yValue:95,
                    content:['Peak 1','(RI)'], color:'#B91C1C', font:{family: 'Prompt', size:9, weight:'600'}, textAlign:'center'
                };
                anns['peak2-box'] = {
                    type:'box', xMin:6, xMax:10, yMin:0, yMax:105,
                    backgroundColor:'rgba(239, 68, 68, 0.08)', borderColor:'rgba(239, 68, 68, 0.3)', borderWidth:1, drawTime: 'beforeDatasetsDraw'
                };
                anns['peak2-label'] = {
                    type:'label', xValue:8, yValue:95,
                    content:['Peak 2','(NPH)'], color:'#B91C1C', font:{family: 'Prompt', size:9, weight:'600'}, textAlign:'center'
                };
            }
            return anns;
        }

        // Main Calculate Function
        function calculate() {
            if (!selected) return;
            
            const dv = document.getElementById('inDate').value;
            const tv = document.getElementById('inTime').value;
            
            if (!dv || !tv) { 
                showToast('กรุณาระบุวันที่และเวลาให้ครบถ้วน'); 
                return; 
            }
            
            const ins = INSULIN[selected];
            const base = new Date(dv + 'T' + tv);
            const totalHrs = ins.duration[1];
            
            // Render Title
            document.getElementById('resultTitle').innerHTML = `<span class="text-brand-600">${ins.name}</span> <span class="text-slate-400 font-normal text-sm ml-2">เริ่มฉีด: ${toTimeStr(base, 0)}</span>`;

            // Prepare Chart Data
            const pts = buildCurve(selected, totalHrs);
            const tickStep = totalHrs <= 8 ? 1 : 2;

            // Destroy old chart if exists
            if (chartInstance) { 
                chartInstance.destroy(); 
            }

            // Create new chart
            const ctx = document.getElementById('insulinChart').getContext('2d');
            const anns = buildAnnotations(selected, base, totalHrs);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'ระดับการออกฤทธิ์ (%)',
                        data: pts,
                        borderColor: '#0F6E56', // brand-500
                        backgroundColor: 'rgba(15, 110, 86, 0.1)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: '#0F6E56',
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(8, 80, 65, 0.95)',
                            titleFont: { family: 'Prompt', size: 13 },
                            bodyFont: { family: 'Prompt', size: 12 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                title: (items) => {
                                    const h = items[0].parsed.x;
                                    return `เวลา ${toTimeStr(base, h)} (ชม. ที่ ${h.toFixed(1)})`;
                                },
                                label: (item) => `การออกฤทธิ์: ${item.parsed.y.toFixed(0)}%`
                            }
                        },
                        annotation: { annotations: anns }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            min: 0,
                            max: totalHrs,
                            ticks: {
                                stepSize: tickStep,
                                color: '#64748b', // slate-500
                                font: { family: 'Inter', size: 11 },
                                callback: (val) => {
                                    const d = new Date(base.getTime() + val * 3600000);
                                    return d.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit', hour12:false});
                                }
                            },
                            grid: { color: '#f1f5f9', drawBorder: false }, // slate-100
                            title: { display: true, text: 'เวลา (น.)', color: '#475569', font: {family: 'Prompt', size: 12} }
                        },
                        y: {
                            min: 0, max: 110,
                            ticks: {
                                color: '#64748b',
                                font: { family: 'Inter', size: 11 },
                                callback: (v) => v <= 100 ? v + '%' : ''
                            },
                            grid: { color: '#f1f5f9', drawBorder: false },
                            title: { display: true, text: 'ระดับการออกฤทธิ์', color: '#475569', font: {family: 'Prompt', size: 12} }
                        }
                    }
                }
            });

            // Update Legend UI
            document.getElementById('chartLegend').innerHTML = `
                <div class="flex items-center gap-1.5 text-xs text-slate-600"><div class="w-3 h-3 rounded-full bg-emerald-400 opacity-50 border border-emerald-500"></div> Onset (เริ่มออกฤทธิ์)</div>
                <div class="flex items-center gap-1.5 text-xs text-slate-600"><div class="w-3 h-3 rounded-full bg-red-400 opacity-30 border border-red-500"></div> Peak (เฝ้าระวังน้ำตาลต่ำ)</div>
                <div class="flex items-center gap-1.5 text-xs text-slate-600"><div class="w-3 h-3 rounded-full bg-brand-500 opacity-20"></div> ระดับยาในเลือด</div>
            `;

            // Generate Info Grid Cards
            let peakCellHTML = '';
            if (selected === 'MIX') {
                peakCellHTML = `
                    <div class="bg-red-50/50 border border-red-100 rounded-xl p-4 sm:col-span-2 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-12 h-12 bg-red-100 rounded-bl-full flex justify-end items-start p-2 opacity-50"><i class="ti ti-trending-up text-red-500"></i></div>
                        <div class="text-xs text-slate-500 mb-1 flex items-center gap-1"><i class="ti ti-trending-up"></i> Dual Peak — ออกฤทธิ์สูงสุด 2 ช่วง</div>
                        
                        <div class="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <div>
                                <div class="text-sm text-slate-700">Peak ① (RI): 1–2 ชม.</div>
                                <div class="text-base font-semibold text-red-600">${fmtRange(base,1,2)}</div>
                            </div>
                            <div>
                                <div class="text-sm text-slate-700">Peak ② (NPH): 6–10 ชม.</div>
                                <div class="text-base font-semibold text-red-600">${fmtRange(base,6,10)}</div>
                            </div>
                        </div>
                        <div class="mt-3 inline-flex items-center gap-1 bg-red-100 text-red-700 text-[11px] font-medium px-2 py-1 rounded-md"><i class="ti ti-alert-triangle"></i> ช่วงเวลาเสี่ยงสูง</div>
                    </div>`;
            } else {
                peakCellHTML = `
                    <div class="bg-red-50/50 border border-red-100 rounded-xl p-4 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-12 h-12 bg-red-100 rounded-bl-full flex justify-end items-start p-2 opacity-50"><i class="ti ti-trending-up text-red-500"></i></div>
                        <div class="text-xs text-slate-500 mb-1 flex items-center gap-1"><i class="ti ti-trending-up"></i> Peak — ออกฤทธิ์สูงสุด</div>
                        <div class="text-sm font-medium text-slate-800">${ins.peak[0]}–${ins.peak[1]} ชั่วโมงหลังฉีด</div>
                        <div class="text-lg font-semibold text-red-600 mt-1">${fmtRange(base, ins.peak[0], ins.peak[1])}</div>
                        <div class="mt-2 inline-flex items-center gap-1 bg-red-100 text-red-700 text-[11px] font-medium px-2 py-1 rounded-md"><i class="ti ti-alert-triangle"></i> ช่วงเวลาเสี่ยงสูง</div>
                    </div>`;
            }

            document.getElementById('infoGrid').innerHTML = `
                <div class="bg-slate-50 border border-slate-100 rounded-xl p-4 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-12 h-12 bg-emerald-100 rounded-bl-full flex justify-end items-start p-2 opacity-50"><i class="ti ti-player-play text-emerald-600"></i></div>
                    <div class="text-xs text-slate-500 mb-1 flex items-center gap-1"><i class="ti ti-player-play"></i> Onset — เริ่มออกฤทธิ์</div>
                    <div class="text-sm font-medium text-slate-800">${ins.onset[0]}–${ins.onset[1]} ชั่วโมงหลังฉีด</div>
                    <div class="text-lg font-semibold text-emerald-600 mt-1">${fmtRange(base, ins.onset[0], ins.onset[1])}</div>
                </div>
                ${peakCellHTML}
                <div class="bg-slate-50 border border-slate-100 rounded-xl p-4">
                    <div class="text-xs text-slate-500 mb-1 flex items-center gap-1"><i class="ti ti-clock"></i> Duration — ระยะเวลาออกฤทธิ์</div>
                    <div class="text-sm font-medium text-slate-800">${ins.duration[0]}–${ins.duration[1]} ชั่วโมง</div>
                    <div class="text-base font-semibold text-slate-700 mt-1">${fmtRange(base, ins.duration[0], ins.duration[1])}</div>
                </div>
                <div class="bg-brand-50 border border-brand-100 rounded-xl p-4 sm:col-span-1">
                    <div class="text-xs text-brand-600/70 mb-1 flex items-center gap-1"><i class="ti ti-utensils"></i> เวลาฉีดที่แนะนำ</div>
                    <div class="text-lg font-medium text-brand-700">${ins.mealTime}</div>
                </div>
            `;

            // Generate Hypoglycemia Content
            let hypoText = '';
            if (selected === 'RI') {
                hypoText = `ควรเฝ้าระวังภาวะน้ำตาลต่ำ (Hypoglycemia) อย่างใกล้ชิดในช่วง <span class="font-semibold text-red-600">1–2 ชั่วโมงหลังฉีด (${fmtRange(base,1,2)})</span> ซึ่งเป็นช่วงที่ยาออกฤทธิ์สูงสุด และอาจมีความเสี่ยงต่อเนื่องถึง 5–8 ชั่วโมง <span class="text-red-500">(${fmtRange(base,5,8)})</span>`;
            } else if (selected === 'NPH') {
                hypoText = `ควรเฝ้าระวังภาวะน้ำตาลต่ำ (Hypoglycemia) ในช่วง <span class="font-semibold text-red-600">6–10 ชั่วโมงหลังฉีด (${fmtRange(base,6,10)})</span> ซึ่งเป็นช่วง Peak <br><span class="inline-block mt-2 text-sm">⚠️ มักเกิดในช่วงดึกหรือเช้ามืด ควรพิจารณาวัดระดับน้ำตาลก่อนนอน และระวังความเสี่ยงต่อเนื่องถึง 10–16 ชั่วโมง <span class="text-red-500">(${fmtRange(base,10,16)})</span></span>`;
            } else {
                hypoText = `ควรเฝ้าระวังภาวะน้ำตาลต่ำ (Hypoglycemia) เป็นพิเศษใน <span class="font-semibold text-red-600">2 ช่วงเวลา</span>:<br>
                <ul class="list-disc pl-5 mt-2 space-y-1 text-red-700">
                    <li><span class="font-semibold">ช่วงที่ 1 (จาก RI): 1–2 ชม. (${fmtRange(base,1,2)})</span></li>
                    <li><span class="font-semibold">ช่วงที่ 2 (จาก NPH): 6–10 ชม. (${fmtRange(base,6,10)})</span></li>
                </ul>
                <span class="inline-block mt-2 text-sm text-red-800/80">ระวังความเสี่ยงต่อเนื่องถึง 10–16 ชั่วโมงหลังฉีด <span class="text-red-500">(${fmtRange(base,10,16)})</span></span>`;
            }

            document.getElementById('hypoBox').innerHTML = `
                <h3 class="text-sm font-semibold text-red-700 mb-2 flex items-center gap-1.5"><i class="ti ti-alert-triangle text-base"></i> การเฝ้าระวังภาวะน้ำตาลในเลือดต่ำ (Hypoglycemia)</h3>
                <p class="text-sm text-red-900/90 leading-relaxed">${hypoText}</p>
                <div class="mt-3 text-sm bg-red-100/50 p-2 rounded-lg text-red-800">
                    <span class="font-semibold">อาการเตือน:</span> เหงื่อออก ใจสั่น มือสั่น หน้ามืด หิวบ่อย สับสน มึนงง
                </div>
            `;

            // Generate Advice Content
            document.getElementById('adviceBox').innerHTML = `
                <h3 class="text-sm font-semibold text-blue-700 mb-3 flex items-center gap-1.5"><i class="ti ti-first-aid-kit text-base"></i> การจัดการเบื้องต้นเมื่อเกิดภาวะน้ำตาลต่ำ (Rule of 15)</h3>
                <ul class="space-y-2.5">
                    <li class="flex items-start gap-2">
                        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-blue-600 text-white text-[10px] font-bold flex items-center justify-center mt-0.5">1</span>
                        <p class="text-sm text-blue-900/90 leading-snug">วัดระดับน้ำตาลในเลือด (Capillary BG) หาก <strong>&lt; 70 mg/dL</strong> ถือว่าน้ำตาลต่ำ</p>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-blue-600 text-white text-[10px] font-bold flex items-center justify-center mt-0.5">2</span>
                        <p class="text-sm text-blue-900/90 leading-snug"><strong>รู้สึกตัวดี/กลืนได้:</strong> ให้คาร์โบไฮเดรต 15 กรัม (เช่น น้ำหวานครึ่งแก้ว 150ml, ลูกอม 3-4 เม็ด, น้ำผึ้ง 3 ช้อนชา)</p>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-blue-600 text-white text-[10px] font-bold flex items-center justify-center mt-0.5">3</span>
                        <p class="text-sm text-blue-900/90 leading-snug">รอ 15 นาที แล้วเจาะซ้ำ หากยัง &lt; 70 mg/dL ให้ทำซ้ำข้อ 2 (หาก &gt; 70 mg/dL แล้ว ให้ทานอาหารมื้อหลักหรือของว่างต่อ)</p>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center mt-0.5">4</span>
                        <p class="text-sm text-blue-900/90 leading-snug"><strong>ไม่รู้สึกตัว/ชัก:</strong> ห้ามกรอกปากเด็ดขาด! ให้ 50% Dextrose 50ml IV push (ตาม Standing order) และแจ้งแพทย์ทันที</p>
                    </li>
                </ul>
            `;

            // Display and animate result section
            const resultSec = document.getElementById('resultSection');
            resultSec.classList.remove('hidden');
            // Small delay to allow display block to render before opacity transition
            setTimeout(() => {
                resultSec.classList.add('opacity-100');
                resultSec.scrollIntoView({behavior:'smooth', block:'start'});
            }, 50);
        }

        // Reset UI Function
        function resetAll() {
            selected = null;
            document.querySelectorAll('.insulin-btn').forEach(b => {
                b.classList.remove('border-brand-500', 'bg-brand-50', 'ring-2', 'ring-brand-500/20');
                b.classList.add('border-slate-200');
                b.querySelector('.icon-container').classList.remove('bg-brand-500');
                b.querySelector('.icon-container').classList.add('bg-slate-100');
                b.querySelector('.icon-element').classList.remove('text-white');
                b.querySelector('.icon-element').classList.add('text-slate-500');
                b.querySelector('.name-element').classList.remove('text-brand-700');
            });
            
            document.getElementById('calcBtn').disabled = true;
            
            const resultSec = document.getElementById('resultSection');
            resultSec.classList.remove('opacity-100');
            setTimeout(() => {
                resultSec.classList.add('hidden');
            }, 500); // Wait for transition

            if (chartInstance) { 
                chartInstance.destroy(); 
                chartInstance = null; 
            }
            setNow();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // Initialize on load
        setNow();
    </script>
</body>
</html>
